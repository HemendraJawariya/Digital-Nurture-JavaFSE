services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: plsql-oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "Oracle123"
      APP_USER: "appuser"
      APP_USER_PASSWORD: "AppUser123"
    healthcheck:
      test: ["CMD-SHELL", "echo 'exit' | sqlplus -s system/Oracle123@//localhost:1521/XEPDB1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 30s
      retries: 40
      start_period: 10m
    volumes:
      - ./:/workspace
